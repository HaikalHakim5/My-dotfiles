### KEYBINDINGS & PROGRAMS ###
source = ~/.config/hypr/configs/keybind.conf

### AUTOSTART ###
source = ~/.config/hypr/configs/exec-once.conf

### ENVIRONMENT VARIABLES ###
source = ~/.config/hypr/configs/env.conf

### LOOK AND FEEL ###
source = ~/.config/hypr/configs/look-feel.conf
#-- in here layout = master

### WINDOWS AND WORKSPACES ###
source = ~/.config/hypr/configs/window-layer.conf

### INPUT ###
# https://wiki.hypr.land/Configuring/Variables/#input
input {
  kb_layout = us

  repeat_rate = 50
  repeat_delay = 300

  follow_mouse = 1

  sensitivity = 0 # 0.1 or 0.2

  touchpad {
    natural_scroll = false
    tap-to-click = true
  }
}

gesture = 3, horizontal, workspace

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}

### MONITORS ###
monitor = eDP-1, 2880x1800@120, 0x0, 2
monitor = , preferred, auto, 1
# Settingan untuk Proyektor / Monitor Eksternal (Mirroring)
monitor = , preferred, auto, 1, mirror, eDP-1

### PERMISSIONS ###

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

