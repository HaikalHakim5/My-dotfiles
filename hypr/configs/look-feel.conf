# Refer to https://wiki.hypr.land/Configuring/Variables/
# https://wiki.hypr.land/Configuring/Variables/#general

### General ###
general {
  # --- Jarak ---
  gaps_in = 6
  gaps_out = 20, 20, 20, 20  # top, right, bottom, left

  # --- Garis Pinggir ---
  border_size = 3
  col.active_border = rgba(ffffffee) rgba(444444ee) 45deg
  col.inactive_border = rgba(1a1a1aaa)

  # --- Kendali Mouse & Interaction ---
  resize_on_border = true
  extend_border_grab_area = 15
  hover_icon_on_border = true

  # --- Layout & Behavior ---
  layout = dwindle
  allow_tearing = false

  # --- Subcategory: Snap ---
  snap {
    enabled = true
    window_gap = 10
    monitor_gap = 10
  }
}

### Decoration ####
decoration {
  rounding = 12
  rounding_power = 2.0 
  # Transparansi
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0
  # Dimming
  dim_inactive = true
  dim_strength = 0.2
  dim_modal = true
  dim_special = 0.2
  dim_around = 0.4
  # Border Behavior
  border_part_of_window = true

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }
  blur {
    enabled = true
    size = 5
    passes = 2

    new_optimizations = true
    xray = true        # GPU bisa napas

    ignore_opacity = true

    vibrancy = 0.2
    contrast = 1.0
    brightness = 1.0

    popups = true 
  }

}

### https://wiki.hypr.land/Configuring/Animations/
### Animations ###
animations {
  enabled = true
  workspace_wraparound = false

  # --- BEZIER ---
  bezier = ease_out,     0.22, 1,    0.36, 1
  bezier = ease_in,      0.55, 0,    1,    0.45
  bezier = ease_inout,   0.65, 0,    0.35, 1
  bezier = soft_bounce,  0.34, 1.56, 0.64, 1
  bezier = luxury,       0.25, 0.1,  0.25, 1

  # --- GLOBAL ---
  animation = global, 1, 5, ease_inout

  # --- WINDOWS ---
  animation = windows,     1, 4, ease_out,   slide
  animation = windowsIn,   1, 7, soft_bounce, popin 20%
  animation = windowsOut,  1, 3, ease_in,    popin 80%
  animation = windowsMove, 1, 5, ease_inout

  # --- FADE ---
  animation = fade,    1, 4, luxury
  animation = fadeIn,  1, 4, ease_out
  animation = fadeOut, 1, 3, ease_in

  # --- LAYERS ---
  animation = layers,    1, 4, ease_out, slide
  animation = layersIn,  1, 4, ease_out, slide
  animation = layersOut, 1, 3, ease_in,  slide

  # --- WORKSPACES ---
  animation = workspaces,       1, 5, ease_inout, slidefade 20%
  animation = specialWorkspace, 1, 5, soft_bounce, slidevert

  # --- BORDER ---
  animation = border,     1, 8, ease_inout
  animation = zoomFactor, 1, 5, ease_out
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    pseudotile = true
    preserve_split = true 
    force_split = 2
    smart_resizing = true
    special_scale_factor = 0.8
}
# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  disable_splash_rendering = true
  animate_manual_resizes = true
  initial_workspace_tracking = 1
  vfr = true
  vrr = 1
}

