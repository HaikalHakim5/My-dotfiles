$terminal = kitty
$fileManager = dolphin
$menu = walker

### KEYBINDINGS ###
$mainMod = SUPER

# APP & SISTEM
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = ,         f23,    exec, $menu  #Input ss
bind = $mainMod, V,      exec, walker -m clipboard
#bind = $mainMod, N,      exec, swaync-client -t -sw
bind = $mainMod, L,      exec, hyprlock
bind = ALT,      F4,     exec, wlogout -b 2 -L 500 -R 500 -T 300 -B 300
bind = $mainMod SHIFT, J, movetoworkspace, special:magic
bind = $mainMod, J, togglespecialworkspace, magic
bind = $SUPER, D, exec, qs ipc call toggleLauncher
# WINDOW MANAGEMENT
bind = $mainMod, Q, killactive,
bind = $mainMod, O, togglefloating,
bind = $mainMod, P, layoutmsg, togglesplit
# F12 (Super + Shift + S)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | tee "$HOME/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png" | wl-copy && notify-send "📸 Screenshot Captured" "Udah masuk folder & clipboard, King!" -a "mako" -i camera-photo

# Switch workspaces [0-9]
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# Move active window to a workspace [0-9]
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10


# Scroll through existing workspaces with mainMod + scroll
bind = ALT, mouse_down, workspace, e+1
bind = ALT, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

