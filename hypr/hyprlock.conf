# --- GENERAL ---
general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

# --- BACKGROUND ---
background {
    monitor =
    path = ~/Pictures/Lockscreen.png
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 0 
}

# --- PROFIL ---
image {
    monitor =
    path = ~/Pictures/IMG_5120.jpg
    size = 120
    rounding = -1
    border_size = 4
    border_color = rgba(255, 255, 255, 0.5)
    position = 0, 340
    halign = center
    valign = center
    zindex = 1
}

# --- BOX ---
shape {
    monitor =
    size = 750, 400
    color = rgba(255, 255, 255, 0.08)
    rounding = 50
    border_size = 3
    border_color = rgba(255, 255, 255, 0.1)
    position = 0, 140
    halign = center
    valign = center
    zindex = 0
}

# --- TIME ---
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 110 
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 135
    halign = center
    valign = center
}

# --- INPUT FIELD ---
input-field {
    monitor =
    size = 350, 65
    outline_thickness = 2
    dots_size = 0.25 
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = 25
    position = 0, -180 
    halign = center
    valign = center
}
