"$schema" = 'https://starship.rs/config-schema.json'

format = """
[‚Ėą](surface0)\
[‚Ėą](fg:surface1 bg:surface0)\
[‚Ėą](fg:surface2 bg:surface1)\
[Óāį](fg:surface2 bg:red)\
$os\
$username\
[Óāį](bg:peach fg:red)\
$directory\
[Óāį](bg:yellow fg:peach)\
$git_branch\
$git_status\
[Óāį](fg:yellow bg:green)\
$c$rust$golang$nodejs$php$java$kotlin$haskell$python\
[Óāį](fg:green bg:sapphire)\
$conda\
[Óāį](fg:sapphire bg:lavender)\
$time\
[Óāī ](fg:lavender)\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Arch = " ůį£á "
Linux = " ůįĆĹ "

[username]
show_always = true
style_user = "bg:red fg:crust"
format = '[ $user ]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 0

# --- GIT MODULES (Fix: No "on", Stay in Yellow Block) ---
[git_branch]
symbol = "Ôźė "
style = "bg:yellow fg:crust"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "bg:yellow fg:crust"
format = '[($all_status$ahead_behind )]($style)'

# --- PROGRAMMING LANGUAGES (Fix: No Emoji, No "via") ---
[nodejs]
symbol = "Óúė"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "Óėě "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Óě®"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Óėß"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "Óėą"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "ÓČĖ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Óėī"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "Óėü"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "ÓėÜ"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

# --- CONDA & TIME ---
[conda]
symbol = "ÔĄĆ"
style = "bg:sapphire"
format = '[[ $symbol( $environment) ](fg:crust bg:sapphire)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ Ôźļ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = false

[character]
success_symbol = '[‚ĚĮ](bold fg:green)'
error_symbol = '[‚ĚĮ](bold fg:red)'

[palettes.catppuccin_mocha]
red = "#f38ba8"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
sapphire = "#74c7ec"
lavender = "#b4befe"
crust = "#11111b"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
