[mgr]
# [parent, current, preview]
ratio          = [ 1, 3, 5 ] 
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
linemode       = "size"
mouse_events   = [ "click", "scroll", "touch", "move", "drag" ]

[preview]
wrap            = "yes"
tab_size        = 2
image_filter    = "lanczos3"
image_quality   = 75

[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]
play = [
    { run = 'mpv "$@"', orphan = true, for = "unix" },
]
look = [
    { run = 'gwenview "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
    { mime = "text/*",  use = "edit" },
    { url = "*.conf",   use = "edit" },
    { url = "*.toml",   use = "edit" },
    { url = "*.lua",    use = "edit" },
    { url = "*.json",   use = "edit" },
    { mime = "video/*", use = "play" },
    { mime = "audio/*", use = "play" },
]

[input]
cursor_blink = true


